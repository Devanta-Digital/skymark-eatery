kind = "web"
previewPath = "/"
title = "Skymark Eatery"
version = "1.0.0"
id = "artifacts/skymark-eatery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24413

[services.development]
run = "pnpm --filter @workspace/skymark-eatery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skymark-eatery", "run", "build" ]
publicDir = "artifacts/skymark-eatery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24413"
BASE_PATH = "/"
